# Cache exclusion conditions
map "$request_uri:$http_cookie" $skip_cache {
    default 0;
    # Excluir por URI
    "~*/wp-admin/" 1;
    "~*/wp-login.php" 1;
    "~*/wp-cron.php" 1;
    "~*/xmlrpc.php" 1;
    "~*\.(xml|txt)$" 1;
    # Excluir por Cookies (usuarios logueados o comentaristas)
    "~*comment_author" 1;
    "~*wordpress_[a-f0-9]+" 1;
    "~*wp-postpass" 1;
    "~*wordpress_no_cache" 1;
    "~*wordpress_logged_in" 1;
}

server {
    # ... tu configuración de server_name y root ...

    # Micro-caching para el index y páginas dinámicas
    location ~ \.php$ {
        # ... tus settings de fastcgi_split_path_info ...
        fastcgi_pass atareao-wordpress:9000;
        
        fastcgi_cache wordpress;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        
        # Aumentamos el tiempo de caché para hits comunes
        fastcgi_cache_valid 200 301 302 12h; 
        fastcgi_cache_valid 404 1m;
        
        # Esto permite servir una página vieja mientras PHP se reinicia o está lento
        fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;
        
        # Background update: sirve la vieja y actualiza la caché en segundo plano
        fastcgi_cache_background_update on;
        
        add_header X-Cache-Status $upstream_cache_status;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html index.htm;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # Cache headers
    add_header X-Cache-Status $upstream_cache_status always;
    
    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # WordPress permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    
    # PHP processing
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass atareao-wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # FastCGI Cache Configuration
        fastcgi_cache wordpress;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache_valid 200 301 302 1h;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        fastcgi_cache_min_uses 1;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 5s;
        fastcgi_cache_revalidate on;
        add_header X-FastCGI-Cache $upstream_cache_status always;
        
        # Buffer settings for better cache performance
        fastcgi_buffering on;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }
    
    # Enhanced static files caching
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        log_not_found off;
        access_log off;
    }
    
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log off;
        try_files $uri @production_images;
    }

    # Fallback: proxy missing images from production server
    location @production_images {
        proxy_pass https://atareao.es;
        proxy_set_header Host atareao.es;
        proxy_ssl_server_name on;
        proxy_cache assets;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Image-Source "production" always;
        log_not_found off;
    }
    
    location ~* \.(woff2?|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        log_not_found off;
        access_log off;
    }
    
    location ~* \.(pdf|doc|docx|txt)$ {
        expires 1w;
        add_header Cache-Control "public";
        log_not_found off;
    }
    
    # PWA files
    location ~ ^/(manifest\.json|sw\.js|offline/)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }
    
    # Security: Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ /wp-config.php {
        deny all;
    }
    
    location ~ /wp-admin/install.php {
        deny all;
    }
}