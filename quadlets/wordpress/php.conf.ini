upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
memory_limit = 256M
max_input_vars = 3000
date.timezone = Europe/Madrid
log_errors = On
error_log = /var/log/php_errors.log
display_errors = Off
max_file_uploads = 20
session.save_handler = redis
session.save_path = "tcp://atareao-redis:6379"