name: CI

on:
  pull_request:
    branches: [main, development]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: PHP Lint
        run: |
          find wp-content/themes/atareao-theme wp-content/plugins/atareao-functionality -type f -name "*.php" -print0 | xargs -0 -n1 php -l
